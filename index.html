<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-900 border border-slate-800 p-8 rounded-3xl shadow-2xl shadow-indigo-950/20">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">
                EduTrack Pro
            </h1>
            <p class="text-sm text-slate-400 mt-2">Academic Performance Portal</p>
        </div>

        <form onsubmit="prosesLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                <input type="text" id="username" autocomplete="username" required
                    class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 placeholder-slate-600 transition" 
                    placeholder="Enter admin username">
            </div>

            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Password</label>
                <input type="password" id="password" autocomplete="current-password" required
                    class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-indigo-500 placeholder-slate-600 transition" 
                    placeholder="Enter your password">
            </div>

            <div id="errorMessage" class="hidden text-xs font-medium text-rose-400 bg-rose-500/5 border border-rose-500/10 rounded-xl p-3 text-center">
                ❌ Invalid username or password. Please try again.
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl text-sm transition shadow-lg shadow-indigo-950/50 mt-2">
                Sign In to Dashboard
            </button>
        </form>

        <div class="text-center mt-6">
            <p class="text-xs text-slate-500">Authorized Administrative Personnel Only</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

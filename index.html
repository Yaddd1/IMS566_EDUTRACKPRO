<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | EduTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>console.warn = () => {};</script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-950 to-slate-900 flex items-center justify-center min-h-screen px-4">

    <div class="bg-slate-900/80 backdrop-blur-md p-8 rounded-2xl shadow-2xl border border-slate-800 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-indigo-500/10 text-indigo-400 mb-3 border border-indigo-500/20">
                👨‍🏫
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">EduTrack Pro</h1>
            <p class="text-sm text-slate-400 mt-1">Sistem Pengurusan & Analisis Prestasi Pelajar</p>
        </div>

        <form id="loginForm" onsubmit="prosesLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Nama Pengguna (Username)</label>
                <input type="text" id="username" class="w-full bg-slate-950/50 border border-slate-800 text-white placeholder-slate-600 px-4 py-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm transition" placeholder="Masukkan 'admin'" required>
            </div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Kata Laluan (Password)</label>
                <input type="password" id="password" class="w-full bg-slate-950/50 border border-slate-800 text-white placeholder-slate-600 px-4 py-3 rounded-xl focus:outline-none focus:border-indigo-500 text-sm transition" placeholder="Masukkan '1234'" required>
            </div>

            <p id="errorMessage" class="text-rose-400 text-xs font-medium hidden flex items-center gap-1.5">
                <span>⚠️</span> Log masuk gagal. Sila semak nama pengguna dan kata laluan anda.
            </p>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium py-3 rounded-xl transition text-sm shadow-lg shadow-indigo-950">
                Log Masuk Ke Sistem
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>

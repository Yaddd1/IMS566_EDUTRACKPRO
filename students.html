<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Directory | EduTrack Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>console.warn = () => {};</script>
</head>
<body class="bg-slate-950 text-slate-100">

    <div id="toastNotification" class="fixed top-5 right-5 z-50 bg-indigo-600 border border-indigo-400/30 text-white px-5 py-3 rounded-xl shadow-2xl shadow-indigo-950 flex items-center gap-3 transform translate-x-80 opacity-0 transition-all duration-300 pointer-events-none">
        <span class="text-lg">✨</span>
        <p id="toastMessage" class="text-xs font-semibold tracking-wide uppercase"></p>
    </div>

    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-8">
                    <span class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-violet-400 bg-clip-text text-transparent">EduTrack Pro</span>
                    <div class="flex flex-wrap gap-1 md:space-x-2">
                        <a href="dashboard.html" class="text-slate-400 hover:text-slate-200 font-medium px-3 py-2 rounded-xl text-sm transition">Dashboard</a>
                        <a href="students.html" class="text-indigo-400 font-medium px-3 py-2 rounded-xl text-sm bg-indigo-500/10 border border-indigo-500/20">Student Directory</a>
                        <a href="grades.html" class="text-slate-400 hover:text-slate-200 font-medium px-3 py-2 rounded-xl text-sm transition">Gradebook</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Student Directory Management</h1>
                <p class="text-sm text-slate-400">Register, update, and manage student enrollment records.</p>
            </div>
            <a href="#addFormSection" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-5 py-3 rounded-xl transition shadow-lg shadow-indigo-950/50">
                + Add New Student
            </a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm lg:col-span-2 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-800 text-xs font-semibold uppercase text-slate-400 tracking-wider">
                            <th class="pb-3">Student ID</th>
                            <th class="pb-3">Full Name</th>
                            <th class="pb-3">Course / Degree Program</th>
                            <th class="pb-3 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentTableBody" class="text-sm divide-y divide-slate-800/40">
                        </tbody>
                </table>
            </div>

            <div id="addFormSection" class="bg-slate-900 p-6 rounded-2xl border border-slate-800 shadow-sm h-fit">
                <h3 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-5 flex items-center gap-2">
                    📝 Student Registration Form
                </h3>
                <form id="addStudentForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Student ID No.</label>
                        <input type="text" id="studentId" class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. WMA21002" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Full Name</label>
                        <input type="text" id="studentName" class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Jane Doe" required>
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-400 mb-1.5">Academic Course / Program</label>
                        <input type="text" id="studentCourse" class="w-full bg-slate-950 border border-slate-800 text-white rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-indigo-500" placeholder="e.g. Software Engineering" required>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-750 border border-slate-700 text-white font-medium py-2.5 rounded-xl text-sm transition">
                        Save Student Record
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            if (typeof displayStudents === "function") displayStudents();
        });
    </script>
</body>
</html>
